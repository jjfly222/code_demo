<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Snake | 科幻贪吃蛇</title>
  <style>
    :root {
      --bg-1: #060a18;
      --bg-2: #0b1831;
      --panel: rgba(15, 27, 56, 0.7);
      --line: rgba(118, 179, 255, 0.22);
      --text: #dff3ff;
      --soft: #95b8d6;
      --neon-cyan: #4dfbff;
      --neon-blue: #4e7bff;
      --neon-pink: #ff48c4;
      --danger: #ff5a75;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(78, 123, 255, 0.22), transparent 34%),
        radial-gradient(circle at 82% 18%, rgba(255, 72, 196, 0.15), transparent 30%),
        radial-gradient(circle at 45% 85%, rgba(77, 251, 255, 0.18), transparent 28%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 18px;
    }

    .board-wrap, .panel {
      background: var(--panel);
      border: 1px solid rgba(108, 168, 255, 0.32);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
    }

    .board-wrap {
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .board-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 20%, rgba(255, 255, 255, 0.06) 50%, transparent 80%);
      animation: scan 6s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }

    canvas {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 1 / 1;
      display: block;
      margin: 0 auto;
      border-radius: 14px;
      border: 1px solid rgba(89, 143, 214, 0.28);
      background: linear-gradient(180deg, rgba(8, 18, 40, 0.95), rgba(6, 15, 36, 0.95));
    }

    .panel {
      padding: 16px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .title {
      margin: 0;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .subtitle {
      margin: 0;
      color: var(--soft);
      font-size: 13px;
    }

    .stats {
      display: grid;
      gap: 8px;
      margin-top: 4px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(7, 18, 41, 0.7);
      font-size: 14px;
    }

    .value {
      color: var(--neon-cyan);
      font-weight: 700;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      height: 38px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-main { background: linear-gradient(120deg, var(--neon-blue), #6f55ff); box-shadow: 0 8px 20px rgba(78, 123, 255, 0.35); }
    .btn-sub { background: linear-gradient(120deg, #1697ff, #2dd6f7); box-shadow: 0 8px 20px rgba(45, 214, 247, 0.25); }
    .btn-danger { background: linear-gradient(120deg, #fd5174, var(--danger)); box-shadow: 0 8px 20px rgba(255, 90, 117, 0.28); }

    .speed {
      margin-top: 4px;
      display: grid;
      gap: 6px;
      color: var(--soft);
      font-size: 13px;
    }

    input[type="range"] { width: 100%; accent-color: var(--neon-cyan); }

    .help {
      margin: 0;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      color: var(--soft);
      font-size: 13px;
      line-height: 1.6;
      background: rgba(7, 18, 41, 0.66);
    }

    .dpad {
      margin-top: 4px;
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .dpad button {
      background: rgba(36, 81, 155, 0.8);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      height: 44px;
    }

    .dpad .empty { visibility: hidden; }

    .status {
      text-align: center;
      color: var(--neon-pink);
      font-size: 13px;
      min-height: 20px;
    }

    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .panel { order: -1; }
      .dpad { display: grid; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="board-wrap">
      <canvas id="game" width="640" height="640" aria-label="贪吃蛇游戏画布"></canvas>
    </section>

    <aside class="panel">
      <h1 class="title">Neon Snake</h1>
      <p class="subtitle">科幻风贪吃蛇</p>

      <div class="stats">
        <div class="item"><span>当前分数</span><span class="value" id="score">0</span></div>
        <div class="item"><span>历史最高</span><span class="value" id="best">0</span></div>
        <div class="item"><span>状态</span><span class="value" id="state">未开始</span></div>
      </div>

      <div class="buttons">
        <button id="startBtn" class="btn-main">开始</button>
        <button id="pauseBtn" class="btn-sub">暂停</button>
        <button id="restartBtn" class="btn-danger">重开</button>
      </div>

      <label class="speed">
        <span>速度调节: <strong id="speedValue">中</strong></span>
        <input id="speedRange" type="range" min="1" max="3" value="2">
      </label>

      <p class="help">方向键/WASD 控制。撞墙或咬到自己即失败。支持手机方向按钮。</p>
      <p class="status" id="statusText"></p>

      <div class="dpad">
        <button class="empty" disabled> </button>
        <button data-dir="up">↑</button>
        <button class="empty" disabled> </button>
        <button data-dir="left">←</button>
        <button data-dir="down">↓</button>
        <button data-dir="right">→</button>
      </div>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const stateEl = document.getElementById("state");
    const statusTextEl = document.getElementById("statusText");
    const speedRange = document.getElementById("speedRange");
    const speedValue = document.getElementById("speedValue");
    const dpad = document.querySelector(".dpad");

    const GRID_SIZE = 24;
    const CELL = canvas.width / GRID_SIZE;

    const SPEED_MAP = {
      1: { label: "慢", stepMs: 170 },
      2: { label: "中", stepMs: 120 },
      3: { label: "快", stepMs: 85 }
    };

    let snake = [];
    let direction = { x: 1, y: 0 };
    let queuedDirection = { x: 1, y: 0 };
    let food = { x: 8, y: 8 };
    let score = 0;
    let best = Number(localStorage.getItem("neonSnakeBest") || 0);
    let running = false;
    let paused = false;
    let gameOver = false;
    let stepMs = SPEED_MAP[speedRange.value].stepMs;
    let lastTime = 0;
    let accumulator = 0;

    bestEl.textContent = best;
    speedValue.textContent = SPEED_MAP[speedRange.value].label;

    function resetGame() {
      snake = [
        { x: 6, y: 12 },
        { x: 5, y: 12 },
        { x: 4, y: 12 }
      ];
      direction = { x: 1, y: 0 };
      queuedDirection = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      paused = false;
      spawnFood();
      updateHud();
      statusTextEl.textContent = "目标: 吃到更多能量核心";
    }

    function spawnFood() {
      while (true) {
        const candidate = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
        if (!snake.some(part => part.x === candidate.x && part.y === candidate.y)) {
          food = candidate;
          return;
        }
      }
    }

    function updateHud() {
      scoreEl.textContent = score;
      stateEl.textContent = gameOver ? "失败" : paused ? "暂停中" : running ? "进行中" : "未开始";
      if (score > best) {
        best = score;
        localStorage.setItem("neonSnakeBest", String(best));
        bestEl.textContent = best;
      }
    }

    function setDirection(next) {
      if (!running || gameOver) return;
      if (next.x === -direction.x && next.y === -direction.y) return;
      queuedDirection = next;
    }

    function gameStep() {
      direction = queuedDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall = head.x < 0 || head.y < 0 || head.x >= GRID_SIZE || head.y >= GRID_SIZE;
      const hitSelf = snake.some(part => part.x === head.x && part.y === head.y);
      if (hitWall || hitSelf) {
        gameOver = true;
        running = false;
        statusTextEl.textContent = "游戏结束，点击重开继续挑战";
        updateHud();
        return;
      }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        spawnFood();
        statusTextEl.textContent = "能量 +10";
      } else {
        snake.pop();
      }

      updateHud();
    }

    function drawGrid() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i <= GRID_SIZE; i++) {
        const p = i * CELL;
        ctx.strokeStyle = "rgba(90, 143, 227, 0.17)";
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function drawFood() {
      const cx = food.x * CELL + CELL / 2;
      const cy = food.y * CELL + CELL / 2;
      const r = CELL * 0.28;
      const gradient = ctx.createRadialGradient(cx, cy, 2, cx, cy, CELL * 0.55);
      gradient.addColorStop(0, "#fff4ff");
      gradient.addColorStop(0.35, "#ff8adf");
      gradient.addColorStop(1, "rgba(255, 72, 196, 0.08)");
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ff58cc";
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSnake() {
      snake.forEach((part, idx) => {
        const x = part.x * CELL;
        const y = part.y * CELL;
        const isHead = idx === 0;
        const gradient = ctx.createLinearGradient(x, y, x + CELL, y + CELL);
        gradient.addColorStop(0, isHead ? "#7efbff" : "#54dfff");
        gradient.addColorStop(1, isHead ? "#6a72ff" : "#3a62ff");
        ctx.fillStyle = gradient;
        ctx.shadowColor = isHead ? "rgba(110, 214, 255, 0.9)" : "rgba(67, 130, 255, 0.5)";
        ctx.shadowBlur = isHead ? 16 : 10;
        roundRect(x + 2, y + 2, CELL - 4, CELL - 4, 8);
        ctx.fill();
      });
      ctx.shadowBlur = 0;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function render(time = 0) {
      const dt = time - lastTime;
      lastTime = time;

      if (running && !paused && !gameOver) {
        accumulator += dt;
        while (accumulator >= stepMs) {
          gameStep();
          accumulator -= stepMs;
        }
      }

      drawGrid();
      drawFood();
      drawSnake();
      requestAnimationFrame(render);
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      if (!running || gameOver) resetGame();
      running = true;
      paused = false;
      statusTextEl.textContent = "开始狩猎能量核心";
      updateHud();
    });

    document.getElementById("pauseBtn").addEventListener("click", () => {
      if (!running || gameOver) return;
      paused = !paused;
      statusTextEl.textContent = paused ? "已暂停，点击继续" : "继续战斗";
      updateHud();
    });

    document.getElementById("restartBtn").addEventListener("click", () => {
      resetGame();
      running = true;
      statusTextEl.textContent = "重新开始";
      updateHud();
    });

    speedRange.addEventListener("input", () => {
      const config = SPEED_MAP[speedRange.value];
      stepMs = config.stepMs;
      speedValue.textContent = config.label;
    });

    document.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d", " "].includes(key)) {
        event.preventDefault();
      }
      if (key === "arrowup" || key === "w") setDirection({ x: 0, y: -1 });
      if (key === "arrowdown" || key === "s") setDirection({ x: 0, y: 1 });
      if (key === "arrowleft" || key === "a") setDirection({ x: -1, y: 0 });
      if (key === "arrowright" || key === "d") setDirection({ x: 1, y: 0 });
      if (key === " " && running && !gameOver) {
        paused = !paused;
        updateHud();
      }
    });

    dpad.addEventListener("click", e => {
      const btn = e.target.closest("button[data-dir]");
      if (!btn) return;
      const dir = btn.dataset.dir;
      if (dir === "up") setDirection({ x: 0, y: -1 });
      if (dir === "down") setDirection({ x: 0, y: 1 });
      if (dir === "left") setDirection({ x: -1, y: 0 });
      if (dir === "right") setDirection({ x: 1, y: 0 });
    });

    resetGame();
    requestAnimationFrame(render);
  </script>
</body>
</html>
